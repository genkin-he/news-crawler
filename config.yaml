bigquery:
  project_id: "news-project-487409" # 替换为您的 GCP 项目 ID
  dataset: "news_project"
  table: "news_articles"
  location: "US"

# 爬虫列表以代码中的 SCRAPER_REGISTRY / SCRAPER_REGISTRY_BROWSER 为准，sources=all 时用注册表 keys，此处不再重复配置

concurrency:
  max_workers: 5 # 最大并发爬虫数
  timeout_per_scraper: 60 # 每个爬虫超时时间（秒）

# link_cache 配置：控制每个新闻源缓存多少条历史链接
link_cache:
  default_limit: 30 # 默认每个源缓存 20 条
  # 特定源自定义限制（设置 "all" 拉取7天内全部）
  source_limits:
    yicaiglobal: "all"
    theregister: "all"
    forbes: "all"
    fidelity: "all"
    businesstimes_news: "all"
    nasdaq: "all"
    businesstimes: "all"
    bastillepost: "all"
    yahoo_finance_asia: "all"
    tradingview: 100
    hk01: "all"
    pingwest: "all"
    yahoo_sg: "all"
    wallstreetcn: "all"
    pingwest_status: "all"
    investinglive: "all"
    statementdog: "all"
    scmp: "all"
